<ion-content [fullscreen]="true" class="register-content">

  <div class="register-bg">
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
  </div>

  <div class="register-container">

    <div class="register-header">
      <ion-button fill="clear" class="back-btn" routerLink="/login">
        <ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon>
      </ion-button>
      <div class="header-text">
        <h1>Crear Cuenta</h1>
        <p>Únete a la billetera del futuro</p>
      </div>
    </div>

    <div class="card-form">
      <form [formGroup]="registerForm" (ngSubmit)="onRegister()">

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Nombre</label>
            <div class="input-wrapper">
              <ion-icon name="person-outline" class="input-icon"></ion-icon>
              <input type="text" class="form-input" placeholder="Nombre" formControlName="nombre" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Apellido</label>
            <div class="input-wrapper">
              <input type="text" class="form-input" placeholder="Apellido" formControlName="apellido" />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Tipo de Documento</label>
          <div class="input-wrapper select-wrapper">
            <ion-icon name="card-outline" class="input-icon"></ion-icon>
            <ion-select
              formControlName="tipoDocumento"
              interface="popover"
              placeholder="Selecciona"
              class="form-select"
            >
              <ion-select-option value="CC">Cédula de Ciudadanía</ion-select-option>
              <ion-select-option value="CE">Cédula de Extranjería</ion-select-option>
              <ion-select-option value="PA">Pasaporte</ion-select-option>
            </ion-select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Número de Documento</label>
          <div class="input-wrapper">
            <ion-icon name="document-outline" class="input-icon"></ion-icon>
            <input type="tel" class="form-input" placeholder="Ej: 1234567890" formControlName="numeroDocumento" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">País</label>
          <div class="input-wrapper">
            <ion-icon name="globe-outline" class="input-icon"></ion-icon>
            <input type="text" class="form-input" placeholder="Ej: Colombia" formControlName="pais" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Correo Electrónico</label>
          <div class="input-wrapper">
            <ion-icon name="mail-outline" class="input-icon"></ion-icon>
            <input type="email" class="form-input" placeholder="tucorreo@email.com" formControlName="email" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <div class="input-wrapper">
            <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
            <input
              [type]="showPassword ? 'text' : 'password'"
              class="form-input"
              placeholder="Mínimo 6 caracteres"
              formControlName="password"
            />
            <ion-icon
              [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
              class="input-icon-right"
              (click)="showPassword = !showPassword"
            ></ion-icon>
          </div>
          <span
            *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.hasError('minlength')"
            class="error-msg"
          >
            La contraseña debe tener mínimo 6 caracteres.
          </span>
        </div>

        <ion-button
          expand="block"
          type="submit"
          class="btn-primary"
          [disabled]="registerForm.invalid"
        >
          Crear Cuenta
        </ion-button>

      </form>
    </div>

    <div class="footer">
      <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
    </div>

  </div>
</ion-content>
