<ion-content [fullscreen]="true" class="login-content">

  <div class="login-bg">
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>
  </div>

  <div class="login-container">

    <div class="header">
      <div class="logo-wrapper">
        <ion-icon name="wallet-outline"></ion-icon>
      </div>
      <h1>MyDigitalWallet</h1>
      <p>Gestiona tus finanzas con seguridad</p>
    </div>

    <div class="card-form">

      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <div class="input-wrapper">
          <ion-icon name="mail-outline" class="input-icon"></ion-icon>
          <input
            type="email"
            placeholder="tucorreo@email.com"
            [(ngModel)]="email"
            name="email"
            class="form-input"
          />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="input-wrapper">
          <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
          <input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="••••••••"
            [(ngModel)]="password"
            name="password"
            class="form-input"
          />
          <ion-icon
            [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
            class="input-icon-right"
            (click)="showPassword = !showPassword"
          ></ion-icon>
        </div>
      </div>

      <ion-button expand="block" shape="round" class="btn-primary" (click)="onLogin()">
        Iniciar Sesión
      </ion-button>

      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">O</span>
        <span class="divider-line"></span>
      </div>

      <button class="btn-google" (click)="onGoogleLogin()">
        <ion-icon name="logo-google" slot="start"></ion-icon>
        Continuar con Google
      </button>

    </div>

    <div class="footer">
      <p>¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
    </div>

  </div>
</ion-content>
