<ion-content [fullscreen]="true" class="ion-padding">
  <div class="login-container">
    <div class="header">
      <ion-icon name="wallet-outline" color="primary" class="logo"></ion-icon>
      <h1>MyDigitalWallet</h1>
      <p>Gestiona tus finanzas con seguridad</p>
    </div>

    <form class="login-form">
      <ion-item lines="none" class="custom-input">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input type="email" placeholder="Correo electrónico" [(ngModel)]="email" name="email"></ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-input">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input type="password" placeholder="Contraseña" [(ngModel)]="password" name="password"></ion-input>
      </ion-item>

      <ion-button expand="block" shape="round" class="login-btn" (click)="onLogin()">
        Iniciar Sesión
      </ion-button>

      <div class="divider">
        <span>O</span>
      </div>

      <ion-button expand="block" fill="outline" shape="round" color="dark" (click)="onGoogleLogin()">
        <ion-icon name="logo-google" slot="start"></ion-icon>
        Continuar con Google
      </ion-button>
    </form>

    <div class="footer">
      <p>¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
    </div>
  </div>
</ion-content>
