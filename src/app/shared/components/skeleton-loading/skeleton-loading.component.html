<div *ngIf="type === 'balance'" class="skeleton-balance">
  <ion-skeleton-text animated style="width: 40%; height: 14px; border-radius: 8px;"></ion-skeleton-text>
  <ion-skeleton-text animated style="width: 70%; height: 36px; border-radius: 8px; margin-top: 8px;"></ion-skeleton-text>
</div>

<div *ngIf="type === 'card'" class="skeleton-card">
  <ion-skeleton-text animated style="width: 100%; height: 170px; border-radius: 16px;"></ion-skeleton-text>
</div>

<div *ngIf="type === 'list'">
  <div *ngFor="let _ of lineArray" class="skeleton-item">
    <ion-skeleton-text animated class="skeleton-icon"></ion-skeleton-text>
    <div class="skeleton-text">
      <ion-skeleton-text animated style="width: 60%; height: 14px; border-radius: 6px;"></ion-skeleton-text>
      <ion-skeleton-text animated style="width: 40%; height: 11px; border-radius: 6px; margin-top: 6px;"></ion-skeleton-text>
    </div>
    <ion-skeleton-text animated style="width: 18%; height: 14px; border-radius: 6px;"></ion-skeleton-text>
  </div>
</div>
