<div class="simulator-container">

  <div class="simulator-header">
    <h2>Simular Pago</h2>
    <ion-button fill="clear" size="small" (click)="onCancel()">
      <ion-icon name="close-outline" slot="icon-only"></ion-icon>
    </ion-button>
  </div>

  <div class="section">
    <p class="section-label">Tarjeta</p>
    <div class="card-selector">
      <div
        *ngFor="let card of cards"
        class="card-option"
        [class.active]="selectedCard?.id === card.id"
        (click)="selectCard(card)"
      >
        <ion-icon [name]="card.type === 'visa' ? 'card-outline' : 'card'"></ion-icon>
        <div class="card-option-info">
          <span class="card-type">{{ card.type | uppercase }}</span>
          <span class="card-last4">•••• {{ card.cardNumber }}</span>
        </div>
        <ion-icon
          *ngIf="selectedCard?.id === card.id"
          name="checkmark-circle"
          class="check-icon"
        ></ion-icon>
      </div>

      <div *ngIf="cards.length === 0" class="no-cards">
        <ion-icon name="card-outline"></ion-icon>
        <p>No tienes tarjetas registradas</p>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="merchant-header">
      <p class="section-label">Comercio</p>
      <button class="refresh-btn" (click)="refreshMerchants()">
        <ion-icon name="refresh-outline"></ion-icon>
        Generar nuevos
      </button>
    </div>

    <div class="merchant-grid">
      <button
        *ngFor="let merchant of merchants"
        class="merchant-card"
        [class.active]="selectedMerchant?.name === merchant.name"
        (click)="selectMerchant(merchant)"
      >
        <span class="merchant-emoji">{{ getCategoryEmoji(merchant.category) }}</span>
        <span class="merchant-name">{{ merchant.name }}</span>
        <span class="merchant-amount">${{ merchant.amount | number }}</span>
        <span class="merchant-category">{{ merchant.category }}</span>
      </button>
    </div>
  </div>

  <div class="summary" *ngIf="selectedCard && selectedMerchant">
    <div class="summary-row">
      <span class="summary-label">Comercio</span>
      <span class="summary-value">{{ selectedMerchant.name }}</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">Monto</span>
      <span class="summary-value amount">${{ selectedMerchant.amount | number }}</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">Tarjeta</span>
      <span class="summary-value">•••• {{ selectedCard.cardNumber }}</span>
    </div>
  </div>

  <ion-button
    expand="block"
    shape="round"
    class="pay-btn"
    [disabled]="!isValid() || processing"
    (click)="onPay()"
  >
    <ion-icon name="checkmark-outline" slot="start"></ion-icon>
    Confirmar Pago
  </ion-button>

</div>
