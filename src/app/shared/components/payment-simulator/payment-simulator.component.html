<div class="simulator-container">
  <div class="simulator-header">
    <h2>Simular Pago</h2>
    <ion-button fill="clear" size="small" (click)="onCancel()">
      <ion-icon name="close-outline" slot="icon-only"></ion-icon>
    </ion-button>
  </div>

  <div class="section">
    <p class="section-label">Selecciona una tarjeta</p>
    <div class="card-selector">
      <div
        *ngFor="let card of cards"
        class="card-option"
        [class.active]="selectedCard?.id === card.id"
        (click)="selectCard(card)"
      >
        <ion-icon [name]="card.type === 'visa' ? 'card-outline' : 'card'"></ion-icon>
        <div class="card-option-info">
          <span class="card-type">{{ card.type | uppercase }}</span>
          <span class="card-last4">•••• {{ card.cardNumber }}</span>
        </div>
        <ion-icon
          *ngIf="selectedCard?.id === card.id"
          name="checkmark-circle"
          class="check-icon"
        ></ion-icon>
      </div>

      <div *ngIf="cards.length === 0" class="no-cards">
        <ion-icon name="card-outline"></ion-icon>
        <p>No tienes tarjetas registradas</p>
      </div>
    </div>
  </div>

  <div class="section">
    <p class="section-label">Monto a pagar</p>
    <div class="amount-input-wrapper">
      <span class="currency">$</span>
      <input
        type="number"
        class="amount-input"
        placeholder="0"
        [(ngModel)]="amount"
        min="1"
      />
    </div>
  </div>

  <div class="section">
    <p class="section-label">Descripción</p>
    <input
      type="text"
      class="text-input"
      placeholder="Ej: Almuerzo, Uber, Netflix..."
      [(ngModel)]="description"
      maxlength="60"
    />
  </div>

  <div class="section">
    <p class="section-label">Categoría</p>
    <div class="category-chips">
      <button
        *ngFor="let cat of categories"
        class="chip"
        [class.active]="category === cat"
        (click)="category = cat"
      >
        {{ cat }}
      </button>
    </div>
  </div>

  <ion-button
    expand="block"
    shape="round"
    class="pay-btn"
    [disabled]="!isValid() || processing"
    (click)="onPay()"
  >
    <ion-icon name="checkmark-outline" slot="start"></ion-icon>
    Confirmar Pago
  </ion-button>
</div>
